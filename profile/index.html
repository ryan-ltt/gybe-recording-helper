<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile — gybe recording helper</title>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="/config.js" onerror="void 0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/setlists-data.js"></script>
    <script src="/best-recordings.js"></script>
    <link rel="stylesheet" href="/index.css">
    <style>
        /* Header */
        header { position: relative; }
        .header-auth {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-btn {
            padding: 4px 10px;
            background: white;
            border: 2px solid black;
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .header-btn:hover { background: #eee; }

        /* Page layout */
        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px 60px;
        }
        .back-link {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 13px;
            color: black;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 24px;
        }
        .back-link:hover { color: #333; }
        h2 {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 20px;
            margin: 0 0 8px 0;
        }
        .profile-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .settings-link {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #555;
            text-decoration: underline;
        }
        .settings-link:hover { color: black; }

        /* Stats bar */
        .profile-stats {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #555;
            margin-bottom: 12px;
        }

        /* Bulk import */
        .track-import { margin-bottom: 20px; }
        .track-import summary { font-family: Monaco, 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; user-select: none; }
        .find-btn {
            display: inline-block;
            padding: 4px 14px;
            background: black;
            color: white;
            border: 2px solid black;
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .find-btn:hover { background: white; color: black; }

        /* Tab nav */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid black;
            margin-bottom: 24px;
        }
        .tab-btn {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 6px 18px;
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            font-weight: bold;
            border-bottom-color: black;
        }
        .tab-btn:hover:not(.active) { background: #f5f5f5; }

        /* Show cards — same as eras tab */
        .era-show-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            gap: 12px;
        }
        .era-show-row:last-child { border-bottom: none; }
        .era-show-date { font-weight: bold; white-space: nowrap; }
        .era-show-venue { color: #555; flex: 1; }
        .era-show-recs { white-space: nowrap; }
        .era-show-recs a { color: #0066cc; text-decoration: none; border-bottom: 1px solid #0066cc; margin-left: 6px; }
        .era-show-recs a:hover { color: #004499; }
        .era-show-recs a.best { font-weight: bold; }
        .era-show-toggle { cursor: pointer; color: #999; font-size: 14px; padding: 0 4px; user-select: none; }
        .era-show-toggle:hover { color: black; }
        .era-show-setlist {
            display: none;
            padding: 6px 0 4px 0;
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #444;
            line-height: 1.9;
            border-bottom: 1px solid #eee;
        }
        .era-show-setlist.open { display: block; }

        .year-group {
            border: 2px solid black;
            background: white;
            margin-bottom: 12px;
        }
        .year-group.complete { border-color: #efbf04; }
        .year-group.complete .year-header:hover { background: #f5f5f5; }
        .year-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
        }
        .year-header:hover { background: #f5f5f5; }
        .year-label {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: bold;
        }
        .year-meta {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .year-toggle {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 16px;
        }
        .year-body {
            display: none;
            border-top: 2px solid black;
            padding: 14px 18px;
        }
        .year-body.open { display: block; }

        .empty-state {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #555;
            margin-top: 24px;
        }
        .not-logged-in {
            font-family: Monaco, 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #555;
            margin-top: 40px;
        }

        @media (max-width: 640px) {
            header { padding: 14px 16px; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
            h1 { font-size: 22px; }
            .header-auth { position: static; transform: none; }
            .page-content { padding: 0 16px 40px; }
            .header-btn { padding: 6px 12px; }
            .show-date { min-width: 80px; }
        }

        .muted { color: #999; }
        .dim { color: #aaa; }
        .secondary-btn { background: white; color: black; }

        /* Dark mode */
        html.dark .muted { color: #cfe0e8; }
        html.dark .dim { color: #c8dce6; }
        html.dark .secondary-btn { background: #1e2a38; color: #eaf2f5; }
        html.dark .back-link { color: #eaf2f5; }
        html.dark .settings-link { color: #eaf2f5; }
        html.dark .profile-stats { color: #eaf2f5; }
        html.dark .header-btn { background: #1e2a38; border-color: #2c3e50; color: #eaf2f5; }
        html.dark .header-btn:hover { background: #253545; }
        html.dark .find-btn { background: #eaf2f5; color: #0e1824; border-color: #eaf2f5; }
        html.dark .find-btn:hover { background: #0e1824; color: #eaf2f5; border-color: #eaf2f5; }
        html.dark .tab-btn { color: #eaf2f5; }
        html.dark .tab-btn.active { font-weight: bold; border-bottom-color: #eaf2f5; color: #eaf2f5; }
        html.dark .tab-btn:hover:not(.active) { background: #253545; }
        html.dark .year-group { border-color: #2c3e50; background: #1e2a38; }
        html.dark .year-group.complete { border-color: #efbf04; }
        html.dark .year-header:hover { background: #253545; }
        html.dark .year-group.complete .year-header:hover { background: #253545; }
        html.dark .year-label { color: #eaf2f5; }
        html.dark .year-meta { color: #eaf2f5; }
        html.dark .year-body { border-top-color: #2c3e50; }
        html.dark .era-show-row { border-bottom-color: #2c3e50; color: #eaf2f5; }
        html.dark .era-show-venue { color: #eaf2f5; }
        html.dark .era-show-recs a { color: #6aadff; border-bottom-color: #6aadff; }
        html.dark .era-show-recs a:hover { color: #8fc4ff; }
        html.dark .era-show-toggle { color: #b8ccd6; }
        html.dark .era-show-toggle:hover { color: #eaf2f5; }
        html.dark .era-show-setlist { color: #eaf2f5; border-bottom-color: #1e2a38; }
        html.dark .empty-state { color: #eaf2f5; }
        html.dark .not-logged-in { color: #eaf2f5; }
        html.dark details summary { color: #eaf2f5; }
        html.dark textarea { background: transparent; color: #c8dce6; }
    </style>
</head>
<body>
    <header>
        <h1>gybe recording helper</h1>
        <div class="header-auth" id="headerAuth"></div>
    </header>

    <div class="page-content">
        <a class="back-link" href="../index.html">← back</a>
        <div id="profileContent"></div>
    </div>

    <script>
        const _SB_URL = typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL : 'https://jouivrvbgyqtyvrrcwcs.supabase.co';
        const _SB_KEY = typeof SUPABASE_ANON_KEY !== 'undefined' ? SUPABASE_ANON_KEY : 'sb_publishable_6y2HvnhrMSBXFxbn2m2qkw_0cCi1j83';
        const sbClient = window.supabase ? window.supabase.createClient(_SB_URL, _SB_KEY) : null;

        let currentUser = null;
        let currentUsername = null;
        let currentUserCreatedAt = null;
        let trackingData = {};
        let votesData = []; // [{ song, show_date }]
        let activeTab = 'attended';

        // Build a date→show lookup from setlists data
        const showByDate = {};
        const showsWithRecordingsByYear = {};
        let totalShowsWithRecordings = 0;
        if (typeof SETLISTS_DATA !== 'undefined') {
            for (const s of SETLISTS_DATA) {
                showByDate[s.date] = s;
                if (s.recordings && s.recordings.length > 0) {
                    const y = s.date.slice(0, 4);
                    showsWithRecordingsByYear[y] = (showsWithRecordingsByYear[y] || 0) + 1;
                    totalShowsWithRecordings++;
                }
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function updateHeaderAuth() {
            const div = document.getElementById('headerAuth');
            const toggleBtn = `<button class="header-btn" onclick="toggleTheme()" title="toggle dark mode">◑</button>`;
            if (currentUser && currentUsername) {
                div.innerHTML = `<span style="font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;color:inherit;">${currentUsername}</span> <button class="header-btn" onclick="doLogout()">log out</button> ${toggleBtn}`;
            } else {
                div.innerHTML = `<a class="header-btn" href="../index.html">back to site</a> ${toggleBtn}`;
            }
        }

        async function doLogout() {
            if (!sbClient) return;
            await sbClient.auth.signOut();
            window.location.href = '../index.html';
        }

        function renderProfile() {
            const el = document.getElementById('profileContent');
            if (!currentUser) {
                el.innerHTML = `<p class="not-logged-in">you need to be logged in to view your profile. <a href="../index.html">go back</a></p>`;
                return;
            }

            const attendedShows = Object.entries(trackingData)
                .filter(([, td]) => td.attended)
                .map(([date]) => showByDate[date])
                .filter(Boolean)
                .sort((a, b) => a.date.localeCompare(b.date));

            const listenedShows = Object.entries(trackingData)
                .filter(([, td]) => td.listened)
                .map(([date]) => showByDate[date])
                .filter(Boolean)
                .sort((a, b) => a.date.localeCompare(b.date));

            const attendedCount = attendedShows.length;
            const listenedCount = listenedShows.length;

            el.innerHTML = `
                <div class="profile-header">
                    <h2>${currentUsername}</h2>
                    <a class="settings-link" href="settings.html">settings</a>
                </div>
                <div class="profile-stats">${attendedCount} show${attendedCount !== 1 ? 's' : ''} attended · ${listenedCount} recording${listenedCount !== 1 ? 's' : ''} listened</div>
                ${currentUserCreatedAt ? `<div class="dim" style="font-family:Monaco,'JetBrains Mono',monospace;font-size:11px;margin-top:4px;">member since ${currentUserCreatedAt.slice(0,10)}</div>` : ''}
                <details class="track-import">
                    <summary>bulk import</summary>
                    <div style="margin-top:10px;">
                        <p style="font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;color:inherit;margin:0 0 8px 0;">paste one show date per line (YYYY-MM-DD)</p>
                        <p style="font-family:Monaco,'JetBrains Mono',monospace;font-size:11px;color:inherit;margin:0 0 8px 0;">note: the lee's palace late show (apr 24, 2011) is listed as 2011-04-24b</p>
                        <textarea id="trackImportInput" rows="6" style="font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;width:100%;box-sizing:border-box;border:1px solid #ccc;padding:6px;" placeholder="2003-07-15&#10;2005-09-10&#10;2010-03-14"></textarea>
                        <div style="margin-top:6px;display:flex;flex-direction:column;gap:8px;font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;">
                            <div style="display:flex;align-items:center;gap:8px;">
                                mark as:
                                <select id="trackImportField" style="font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;border:1px solid #ccc;padding:2px 4px;">
                                    <option value="attended">attended</option>
                                    <option value="listened">listened</option>
                                </select>
                            </div>
                            <div style="display:flex;gap:8px;">
                                <button class="find-btn" onclick="bulkImportTracking()">import</button>
                                <button class="find-btn secondary-btn" onclick="document.getElementById('trackImportFile').click()">upload file</button>
                                <input type="file" id="trackImportFile" accept=".txt,.json" style="display:none" onchange="loadTrackFile(this)">
                            </div>
                        </div>
                        <div id="trackImportResult" style="font-family:Monaco,'JetBrains Mono',monospace;font-size:12px;margin-top:8px;color:inherit;"></div>
                    </div>
                </details>
                <div class="tab-nav">
                    <button class="tab-btn${activeTab === 'attended' ? ' active' : ''}" onclick="switchTab('attended')">attended (${attendedCount})</button>
                    <button class="tab-btn${activeTab === 'listened' ? ' active' : ''}" onclick="switchTab('listened')">listened (${listenedCount})</button>
                    <button class="tab-btn${activeTab === 'votes' ? ' active' : ''}" onclick="switchTab('votes')">votes (${votesData.length})</button>
                </div>
                <div id="showList"></div>`;

            renderShowList();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.startsWith(tab));
            });
            if (tab === 'votes') renderVotesList();
            else renderShowList();
        }

        function renderShowList() {
            const listEl = document.getElementById('showList');
            if (!listEl) return;

            const shows = Object.entries(trackingData)
                .filter(([, td]) => td[activeTab])
                .map(([date]) => showByDate[date])
                .filter(Boolean)
                .sort((a, b) => a.date.localeCompare(b.date));

            if (shows.length === 0) {
                listEl.innerHTML = `<p class="empty-state">no shows marked as ${activeTab} yet. <a href="../index.html#eras">head to the shows tab</a> to track shows.</p>`;
                return;
            }

            // Group by year
            const byYear = {};
            for (const s of shows) {
                const y = s.date.slice(0, 4);
                if (!byYear[y]) byYear[y] = [];
                byYear[y].push(s);
            }

            const noteField = activeTab === 'listened' ? 'listened_notes' : 'attended_notes';
            const autoOpen = shows.length < 10;
            listEl.innerHTML = Object.keys(byYear).sort().map(year => {
                const rows = byYear[year].map(s => {
                    const bestId = typeof BEST_RECORDINGS !== 'undefined' ? BEST_RECORDINGS[s.date] : null;
                    const recsHtml = s.recordings.map((r, i) =>
                        `<a href="${r.url}" target="_blank"${bestId === r.id ? ' style="font-weight:bold"' : ''}>[${i + 1}]</a>`
                    ).join('');
                    const mainSongs = [], soundcheckSongs = [];
                    for (const song of s.songs) {
                        if (/\(soundcheck\)/i.test(song)) soundcheckSongs.push(song);
                        else mainSongs.push(song);
                    }
                    let setlistText = '';
                    if (soundcheckSongs.length > 0) {
                        setlistText += `<span class="muted" style="font-size:10px;display:block;margin-bottom:2px;">soundcheck</span>` +
                            soundcheckSongs.map(song => `<span class="dim">${song.replace(/\s*\(soundcheck\)/i, '')}</span>`).join('<br>') +
                            `<br><span class="muted" style="font-size:10px;display:block;margin-top:6px;margin-bottom:2px;">setlist</span>`;
                    }
                    setlistText += mainSongs.join('<br>');
                    if (s.note) setlistText += `<br><span class="muted" style="padding-left:16px;font-size:11px;">${s.note}</span>`;
                    const id = 'sl-' + s.date.replace(/\W/g, '-');
                    const hasSetlist = s.songs.length > 0;
                    const existingNote = (trackingData[s.date]?.[noteField] || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const noteDiv = `<div style="margin-bottom:${hasSetlist ? '8px' : '0'};padding-bottom:${hasSetlist ? '6px' : '0'};border-bottom:${hasSetlist ? '1px solid #eee' : 'none'};" onclick="event.stopPropagation()">
                        <div style="display:flex;align-items:flex-start;gap:6px;">
                            <textarea id="note-${s.date}" placeholder="add a note..."
                                oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
                                style="flex:1;border:none;padding:2px 0;font-family:Monaco,'JetBrains Mono',monospace;font-size:11px;color:inherit;background:transparent;outline:none;resize:none;overflow:hidden;line-height:1.6;">${existingNote}</textarea>
                            <button onclick="saveNote('${s.date}', '${noteField}', document.getElementById('note-${s.date}').value)"
                                style="font-family:Monaco,'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border:1px solid #ccc;background:white;cursor:pointer;color:inherit;flex-shrink:0;">save</button>
                        </div>
                    </div>`;
                    const hasNote = !!(trackingData[s.date]?.[noteField]);
                    return `<div class="era-show-row" onclick="toggleSetlist('${id}')" style="cursor:pointer;">
                        <span class="era-show-date">${s.date.replace(/[a-z]$/, '')}</span>
                        <span class="era-show-venue">${s.venue}${hasNote ? ' <span class="dim" style="font-size:10px;" title="you have left a note for this show">[n]</span>' : ''}</span>
                        <span class="era-show-recs" onclick="event.stopPropagation()">${recsHtml}</span>
                        <span class="era-show-toggle" id="tgl-${id}">+</span>
                    </div>
                    <div class="era-show-setlist" id="${id}">
                        ${noteDiv}
                        ${hasSetlist ? setlistText : ''}
                    </div>`;
                }).join('');
                const count = byYear[year].length;
                const totalInYear = activeTab === 'listened' ? (showsWithRecordingsByYear[year] || 0) : null;
                const countLabel = totalInYear !== null ? `${count} / ${totalInYear} show${totalInYear !== 1 ? 's' : ''}` : `${count} show${count !== 1 ? 's' : ''}`;
                const complete = totalInYear !== null && totalInYear > 0 && count === totalInYear;
                return `<div class="year-group${complete ? ' complete' : ''}">
                    <div class="year-header" onclick="toggleYear('y${year}')">
                        <div class="year-label">${year}</div>
                        <div class="year-meta">
                            <span>${countLabel}</span>
                            <span class="year-toggle" id="ytgl-y${year}">${autoOpen ? '−' : '+'}</span>
                        </div>
                    </div>
                    <div class="year-body${autoOpen ? ' open' : ''}" id="ybody-y${year}">
                        ${rows}
                    </div>
                </div>`;
            }).join('');
            listEl.querySelectorAll('textarea[id^="note-"]').forEach(ta => {
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            });
        }

        function renderVotesList() {
            const listEl = document.getElementById('showList');
            if (!listEl) return;
            if (votesData.length === 0) {
                listEl.innerHTML = `<p class="empty-state">no votes yet. <a href="../index.html#versions">head to the versions tab</a> to vote on performances.</p>`;
                return;
            }

            // Group by year of voted show
            const byYear = {};
            for (const v of votesData) {
                const y = v.show_date.slice(0, 4);
                if (!byYear[y]) byYear[y] = [];
                byYear[y].push(v);
            }

            const autoOpen = votesData.length < 10;
            listEl.innerHTML = Object.keys(byYear).sort().map(year => {
                const votes = byYear[year].sort((a, b) => a.song.localeCompare(b.song));
                const rows = votes.map(v => {
                    const show = showByDate[v.show_date];
                    const venue = show ? show.venue : '';
                    const date = v.show_date.replace(/[a-z]$/, '');
                    return `<div class="era-show-row" style="cursor:default;">
                        <span class="era-show-date">${date}</span>
                        <span class="era-show-venue">${v.song}${venue ? ` <span class="dim" style="font-size:10px;">— ${venue}</span>` : ''}</span>
                    </div>`;
                }).join('');
                const count = votes.length;
                return `<div class="year-group">
                    <div class="year-header" onclick="toggleYear('v${year}')">
                        <div class="year-label">${year}</div>
                        <div class="year-meta">
                            <span>${count} vote${count !== 1 ? 's' : ''}</span>
                            <span class="year-toggle" id="ytgl-v${year}">${autoOpen ? '−' : '+'}</span>
                        </div>
                    </div>
                    <div class="year-body${autoOpen ? ' open' : ''}" id="ybody-v${year}">
                        ${rows}
                    </div>
                </div>`;
            }).join('');
        }

        function toggleYear(id) {
            const body = document.getElementById('ybody-' + id);
            const tgl = document.getElementById('ytgl-' + id);
            const isOpen = body.classList.toggle('open');
            tgl.textContent = isOpen ? '−' : '+';
            if (isOpen) {
                body.querySelectorAll('textarea[id^="note-"]').forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
            }
        }

        function toggleSetlist(id) {
            const el = document.getElementById(id);
            const tgl = document.getElementById('tgl-' + id);
            const isOpen = el.classList.toggle('open');
            tgl.textContent = isOpen ? '−' : '+';
            if (isOpen) {
                el.querySelectorAll('textarea[id^="note-"]').forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
            }
        }

        function loadTrackFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const text = e.target.result.trim();
                let dates = [];
                try {
                    const parsed = JSON.parse(text);
                    dates = Array.isArray(parsed) ? parsed : Object.keys(parsed);
                } catch {
                    dates = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                }
                document.getElementById('trackImportInput').value = dates.join('\n');
            };
            reader.readAsText(file);
            input.value = '';
        }

        async function saveNote(date, field, value) {
            if (!currentUser || !sbClient) return;
            const note = value.trim() || null;
            if (!trackingData[date]) trackingData[date] = { attended: false, listened: false, listened_notes: '', attended_notes: '' };
            trackingData[date][field] = note || '';
            const td = trackingData[date];
            await sbClient.from('show_tracking').upsert(
                { user_id: currentUser.id, show_date: date, attended: td.attended, listened: td.listened, listened_notes: td.listened_notes || null, attended_notes: td.attended_notes || null },
                { onConflict: 'user_id,show_date' }
            );
            const btn = event.target;
            const orig = btn.textContent;
            btn.textContent = 'saved';
            setTimeout(() => { btn.textContent = orig; }, 1500);
        }

        async function bulkImportTracking() {
            if (!currentUser) return;
            const field = document.getElementById('trackImportField').value;
            const raw = document.getElementById('trackImportInput').value;
            const resultEl = document.getElementById('trackImportResult');
            const lines = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
            const matched = [], unmatched = [];
            for (const line of lines) {
                if (showByDate[line]) matched.push(line);
                else unmatched.push(line);
            }
            if (matched.length === 0) { resultEl.textContent = 'no matching dates found.'; return; }
            const rows = matched.map(date => {
                const existing = trackingData[date] || { attended: false, listened: false, listened_notes: null, attended_notes: null };
                return { user_id: currentUser.id, show_date: date, attended: existing.attended, listened: existing.listened, listened_notes: existing.listened_notes || null, attended_notes: existing.attended_notes || null, [field]: true };
            });
            for (const row of rows) {
                if (!trackingData[row.show_date]) trackingData[row.show_date] = { attended: false, listened: false };
                trackingData[row.show_date][field] = true;
            }
            await sbClient.from('show_tracking').upsert(rows, { onConflict: 'user_id,show_date' });
            let msg = `imported ${matched.length} show${matched.length !== 1 ? 's' : ''}.`;
            if (unmatched.length > 0) msg += ` unrecognized: ${unmatched.join(', ')}`;
            resultEl.textContent = msg;
            renderProfile();
        }

        // Init
        if (sbClient) {
            sbClient.auth.getSession().then(async ({ data: { session } }) => {
                currentUser = session?.user ?? null;
                if (currentUser) {
                    const [profileRes, trackingRes, votesRes] = await Promise.all([
                        sbClient.from('profiles').select('username, created_at').eq('user_id', currentUser.id).single(),
                        sbClient.from('show_tracking').select('show_date,attended,listened,listened_notes,attended_notes').eq('user_id', currentUser.id),
                        sbClient.from('votes').select('song, show_date').eq('user_id', currentUser.id)
                    ]);
                    currentUsername = profileRes.data?.username || null;
                    currentUserCreatedAt = profileRes.data?.created_at || null;
                    trackingData = {};
                    if (trackingRes.data) {
                        for (const row of trackingRes.data) {
                            trackingData[row.show_date] = { attended: row.attended, listened: row.listened, listened_notes: row.listened_notes || '', attended_notes: row.attended_notes || '' };
                        }
                    }
                    votesData = votesRes.data || [];
                }
                updateHeaderAuth();
                renderProfile();
            });
        } else {
            renderProfile();
        }
    </script>
</body>
</html>
